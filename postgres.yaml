apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: task-system

spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:
      containers:
      - name: postgres
        image: postgres:15
        env:
        - name: POSTGRES_USER
          value: "dev"
        - name: POSTGRES_PASSWORD
          value: "dev"
        - name: POSTGRES_DB
          value: "tasks"
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: task-system

spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
