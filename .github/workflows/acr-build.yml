name: Build and Push Docker Image to ACR

on:
  push:
    branches: 
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        run: az acr login --name taskregistry1

      - name: Build API image
        run: |
          docker build -t taskregistry1.azurecr.io/api:${{ github.sha }} ./api

      - name: Build Worker image
        run: |
          docker build -t taskregistry1.azurecr.io/worker:${{ github.sha }} ./worker

      - name: Build Frontend image
        run: |
          docker build -t taskregistry1.azurecr.io/frontend:${{ github.sha }} ./frontend

      - name: Push API image
        run: |
          docker push taskregistry1.azurecr.io/api:${{ github.sha }}

      - name: Push Worker image
        run: |
          docker push taskregistry1.azurecr.io/worker:${{ github.sha }}

      - name: Push Frontend image
        run: |
          docker push taskregistry1.azurecr.io/frontend:${{ github.sha }}