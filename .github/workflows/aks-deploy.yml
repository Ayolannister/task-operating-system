name: Deploy Frontend Image to AKS

on:
  push:
    branches:
      - main
    paths:
      - 'k8s-cloud/**'
      - '.github/workflows/aks-deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_REPOSITORY: taskregistry1.azurecr.io/frontend
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group task-resource-group \
            --name demo \
            --overwrite-existing

      - name: Verify AKS Context
        run: |
              kubectl config current-context
              kubectl cluster-info
              kubectl get nodes

      - name: Apply Kubernetes Manifests
        run: |
          kubectl apply -f k8s-cloud/

      - name: Update Deployment Image
        run: |
          kubectl set image deployment/task-app task-app=${IMAGE_REPOSITORY}:${IMAGE_TAG}

      - name: Check Deployment
        run: |
          kubectl rollout status deployment/task-app

      - name: Show Services
        run: |
          kubectl get svc