name: Kubernetes Workflow

on:
  workflow_call:

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: taskregistry1
  ACR_LOGIN_SERVER: taskregistry1.azurecr.io
  RESOURCE_GROUP: task-resource-group
  AKS_CLUSTER: demo

jobs:
  kubernetes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group $RESOURCE_GROUP \
            --name $AKS_CLUSTER \
            --overwrite-existing

      - name: Wait for AKS Nodes
        run: |
          kubectl wait \
            --for=condition=Ready nodes \
            --all \
            --timeout=300s

      - name: Install NGINX Ingress Controller
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/cloud/deploy.yaml

          kubectl wait \
            --namespace ingress-nginx \
            --for=condition=ready pod \
            --selector=app.kubernetes.io/component=controller \
            --timeout=300s

      - name: Apply Kubernetes Manifests
        run: |
          kubectl apply -f k8s-cloud/

      - name: Verify API Rollout
        run: |
          kubectl rollout status deployment/api \
            -n task-system \
            --timeout=300s

      - name: Verify Worker Rollout
        run: |
          kubectl rollout status deployment/worker \
            -n task-system \
            --timeout=300s

      - name: Verify Frontend Rollout
        run: |
          kubectl rollout status deployment/frontend \
            -n task-system \
            --timeout=300s

      - name: Kubernetes Status
        run: |
          kubectl get pods -n task-system
          kubectl get svc -n task-system
          kubectl get ingress -n task-system
