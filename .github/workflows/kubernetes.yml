name: Deploy to AKS

on:
  workflow_call:

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: taskregistry1
  ACR_LOGIN_SERVER: taskregistry1.azurecr.io
  RESOURCE_GROUP: task-resource-group
  AKS_CLUSTER: demo
  NAMESPACE: task-system

jobs:
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group $RESOURCE_GROUP \
            --name $AKS_CLUSTER \
            --overwrite-existing

      - name: Ensure AKS Can Pull From ACR
        run: |
          az aks update \
            --resource-group $RESOURCE_GROUP \
            --name $AKS_CLUSTER \
            --attach-acr $ACR_NAME || true

      - name: Wait for AKS Nodes
        run: |
          kubectl wait \
            --for=condition=Ready nodes \
            --all \
            --timeout=300s

      - name: Ensure Namespace Exists
        run: |
          kubectl create namespace $NAMESPACE \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Kubernetes Manifests
        run: |
          kubectl apply -f k8s-cloud/

      - name: Update API Deployment
        run: |
          kubectl set image deployment/api \
            api=$ACR_LOGIN_SERVER/api:${{ github.sha }} \
            -n $NAMESPACE

      - name: Update Worker Deployment
        run: |
          kubectl set image deployment/worker \
            worker=$ACR_LOGIN_SERVER/worker:${{ github.sha }} \
            -n $NAMESPACE

      - name: Update Frontend Deployment
        run: |
          kubectl set image deployment/frontend \
            frontend=$ACR_LOGIN_SERVER/frontend:${{ github.sha }} \
            -n $NAMESPACE

      - name: Verify API Rollout
        run: |
          kubectl rollout status deployment/api \
            -n $NAMESPACE \
            --timeout=300s

      - name: Verify Worker Rollout
        run: |
          kubectl rollout status deployment/worker \
            -n $NAMESPACE \
            --timeout=300s

      - name: Verify Frontend Rollout
        run: |
          kubectl rollout status deployment/frontend \
            -n $NAMESPACE \
            --timeout=300s

      - name: Kubernetes Status
        if: always()
        run: |
          echo "========== PODS =========="
          kubectl get pods -n $NAMESPACE -o wide

          echo
          echo "========== SERVICES =========="
          kubectl get svc -n $NAMESPACE

          echo
          echo "========== INGRESS =========="
          kubectl get ingress -n $NAMESPACE

          echo
          echo "========== DEPLOYMENTS =========="
          kubectl get deployments -n $NAMESPACE

          echo
          echo "========== EVENTS =========="
          kubectl get events \
            -n $NAMESPACE \
            --sort-by=.lastTimestamp

      - name: Describe Pods on Failure
        if: failure()
        run: |
          for pod in $(kubectl get pods -n $NAMESPACE -o name); do
            echo "======================================="
            echo "$pod"
            echo "======================================="
            kubectl describe "$pod" -n $NAMESPACE || true
          done

      - name: Show Container Logs on Failure
        if: failure()
        run: |
          for pod in $(kubectl get pods -n $NAMESPACE -o jsonpath='{.items[*].metadata.name}'); do
            echo "======================================="
            echo "$pod"
            echo "======================================="
            kubectl logs "$pod" \
              -n $NAMESPACE \
              --all-containers=true \
              --tail=200 || true
          done
