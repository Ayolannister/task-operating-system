name: Terraform Workflow

on:
  workflow_call:

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: taskregistry1
  ACR_LOGIN_SERVER: taskregistry1.azurecr.io
  RESOURCE_GROUP: task-resource-group
  AKS_CLUSTER: demo

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./aks-infra
        run: terraform init

      - name: Terraform Validate
        working-directory: ./aks-infra
        run: terraform validate

      - name: Terraform Plan
        working-directory: ./aks-infra
        run: terraform plan

      - name: Terraform Apply
        working-directory: ./aks-infra
        run: terraform apply -auto-approve
