name: Build Images Workflow

on:
  workflow_call:

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: taskregistry1
  ACR_LOGIN_SERVER: taskregistry1.azurecr.io
  RESOURCE_GROUP: task-resource-group
  AKS_CLUSTER: demo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create ACR if it does not exist
        run: |
          if ! az acr show \
            --name $ACR_NAME \
            --resource-group $RESOURCE_GROUP &>/dev/null; then
            echo "Creating ACR..."
            az acr create \
              --resource-group $RESOURCE_GROUP \
              --name $ACR_NAME \
              --sku Basic \
              --admin-enabled true
          else
            echo "ACR already exists"
          fi

      - name: ACR Login
        run: az acr login --name $ACR_NAME

      - name: Build API Image
        run: |
          docker build \
            -t $ACR_LOGIN_SERVER/api:latest \
            -t $ACR_LOGIN_SERVER/api:${{ github.sha }} \
            ./api

      - name: Build Worker Image
        run: |
          docker build \
            -t $ACR_LOGIN_SERVER/worker:latest \
            -t $ACR_LOGIN_SERVER/worker:${{ github.sha }} \
            ./worker

      - name: Build Frontend Image
        run: |
          docker build \
            -t $ACR_LOGIN_SERVER/frontend:latest \
            -t $ACR_LOGIN_SERVER/frontend:${{ github.sha }} \
            ./frontend
