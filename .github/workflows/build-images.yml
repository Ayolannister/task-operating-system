name: Build Images Workflow




on:
  workflow_call:

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: taskregistry1
  ACR_LOGIN_SERVER: taskregistry1.azurecr.io
  RESOURCE_GROUP: task-resource-group

jobs:
  build-images:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Azure Container Registry Exists
        run: |
          if ! az acr show \
            --name $ACR_NAME \
            --resource-group $RESOURCE_GROUP >/dev/null 2>&1; then

            echo "Creating Azure Container Registry..."

            az acr create \
              --name $ACR_NAME \
              --resource-group $RESOURCE_GROUP \
              --sku Basic \
              --admin-enabled true
          else
            echo "Azure Container Registry already exists."
          fi

      - name: Login to Azure Container Registry
        run: |
          az acr login --name $ACR_NAME

      - name: Build API Image
        run: |
          docker build \
            -t $ACR_LOGIN_SERVER/api:latest \
            -t $ACR_LOGIN_SERVER/api:${{ github.sha }} \
            ./api

      - name: Push API Image
        run: |
          docker push $ACR_LOGIN_SERVER/api:latest
          docker push $ACR_LOGIN_SERVER/api:${{ github.sha }}

      - name: Build Worker Image
        run: |
          docker build \
            -t $ACR_LOGIN_SERVER/worker:latest \
            -t $ACR_LOGIN_SERVER/worker:${{ github.sha }} \
            ./worker

      - name: Push Worker Image
        run: |
          docker push $ACR_LOGIN_SERVER/worker:latest
          docker push $ACR_LOGIN_SERVER/worker:${{ github.sha }}

      - name: Build Frontend Image
        run: |
          docker build \
            -t $ACR_LOGIN_SERVER/frontend:latest \
            -t $ACR_LOGIN_SERVER/frontend:${{ github.sha }} \
            ./frontend

      - name: Push Frontend Image
        run: |
          docker push $ACR_LOGIN_SERVER/frontend:latest
          docker push $ACR_LOGIN_SERVER/frontend:${{ github.sha }}

      - name: Verify Images in ACR
        run: |
          echo "===== API ====="
          az acr repository show-tags \
            --name $ACR_NAME \
            --repository api

          echo "===== Worker ====="
          az acr repository show-tags \
            --name $ACR_NAME \
            --repository worker

          echo "===== Frontend ====="
          az acr repository show-tags \
            --name $ACR_NAME \
            --repository frontend
