name: Push Images Workflow

on:
  workflow_call:

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: taskregistry1
  ACR_LOGIN_SERVER: taskregistry1.azurecr.io
  RESOURCE_GROUP: task-resource-group
  AKS_CLUSTER: demo

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        run: az acr login --name $ACR_NAME

      - name: Push API Image
        run: |
          docker push $ACR_LOGIN_SERVER/api:latest
          docker push $ACR_LOGIN_SERVER/api:${{ github.sha }}

      - name: Push Worker Image
        run: |
          docker push $ACR_LOGIN_SERVER/worker:latest
          docker push $ACR_LOGIN_SERVER/worker:${{ github.sha }}

      - name: Push Frontend Image
        run: |
          docker push $ACR_LOGIN_SERVER/frontend:latest
          docker push $ACR_LOGIN_SERVER/frontend:${{ github.sha }}
