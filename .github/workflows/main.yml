name: AKS CI/CD Pipeline

on:
  push:
    branches:
      - main
      - '**'
    paths-ignore:
      - README.md

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: taskregistry1
  ACR_LOGIN_SERVER: taskregistry1.azurecr.io
  RESOURCE_GROUP: task-resource-group
  AKS_CLUSTER: demo

jobs:
  terraform:
    name: Provision Infrastructure
    uses: ./.github/workflows/terraform.yml
    secrets: inherit

  build-images:
    name: Build & Push Images
    needs: terraform
    uses: ./.github/workflows/build-images.yml
    secrets: inherit

  kubernetes:
    name: Deploy to AKS
    needs: build-images
    uses: ./.github/workflows/kubernetes.yml
    secrets: inherit

  # update-deployments removed; `kubernetes.yml` performs manifests + image updates
