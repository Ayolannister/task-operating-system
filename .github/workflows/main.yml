name: test

on:
  push:
    branches:
      - main
      - '**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read


jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Show files
        run: |
          pwd
          ls -la
          find . -name "*.tf"

      - name: Terraform Init
        working-directory: ./aks-infra
        run: terraform init

      - name: Terraform Plan
        working-directory: ./aks-infra
        run: terraform plan