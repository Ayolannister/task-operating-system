name: AKS CI/CD Pipeline

on:
  push:
    branches:
      - main
      - '**'
    paths-ignore:
      - 'README.md'

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: taskregistry1
  ACR_LOGIN_SERVER: taskregistry1.azurecr.io
  RESOURCE_GROUP: task-resource-group
  AKS_CLUSTER: demo

jobs:
  terraform:
    uses: ./.github/workflows/terraform.yml
    secrets: inherit

  build-images:
    needs: terraform
    uses: ./.github/workflows/build-images.yml
    secrets: inherit

  push-images:
    needs: build-images
    uses: ./.github/workflows/push-images.yml
    secrets: inherit

  update-deployments:
    needs: push-images
    uses: ./.github/workflows/update-deployments.yml
    secrets: inherit

  kubernetes:
    needs: update-deployments
    uses: ./.github/workflows/kubernetes.yml
    secrets: inherit
