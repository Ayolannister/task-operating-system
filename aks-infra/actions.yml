name: test

on:
  push:
    branches:
      - main
      - '**'   
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Hello World container
        run: docker run hello-world

      - name: Run Alpine container with echo
        run: docker run alpine echo "Hello from Alpine!"
