apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: task-system

spec:
  replicas: 1

  selector:
    matchLabels:
      app: api

  template:
    metadata:
      labels:
        app: api

    spec:
      containers:
      - name: api

        image: ayolannister/task-operatingsystem-api:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: DB_HOST
          value: "postgres"
        - name: DB_USER
          value: "dev"
        - name: DB_PASSWORD
          value: "dev"
        - name: DB_NAME
          value: "tasks"
        - name: REDIS_HOST
          value: "redis"

        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: task-system

spec:
  type: NodePort

  selector:
    app: api

  ports:
  - port: 5000
    targetPort: 5000
