apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: task-system

spec:
  accessModes:
    - ReadWriteOnce

  resources:
    requests:
      storage: 2Gi

  storageClassName: managed-csi

---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: postgres
  namespace: task-system

spec:
  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:
      containers:
        - name: postgres

          image: postgres:15

          ports:
            - containerPort: 5432

          env:
            - name: POSTGRES_USER
              value: "dev"

            - name: POSTGRES_PASSWORD
              value: "dev"

            - name: POSTGRES_DB
              value: "tasks"

            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata

          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data

            - name: init-script
              mountPath: /docker-entrypoint-initdb.d

      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc

        - name: init-script
          configMap:
            name: postgres-init-script

---
apiVersion: v1
kind: Service

metadata:
  name: postgres
  namespace: task-system

spec:
  selector:
    app: postgres

  ports:
    - port: 5432
      targetPort: 5432