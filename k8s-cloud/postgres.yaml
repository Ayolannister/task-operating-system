apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: task-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: managed-csi  # Azure premium SSD for performance

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: task-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15
        env:
        - name: POSTGRES_USER
          value: "dev"
        - name: POSTGRES_PASSWORD
          value: "dev"
        - name: POSTGRES_DB
          value: "tasks"
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: task-system
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
