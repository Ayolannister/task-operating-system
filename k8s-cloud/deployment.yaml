apiVersion: apps/v1
kind: Deployment

metadata:
  name: task-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: task-app

  template:
    metadata:
      labels:
        app: task-app

    spec:
      containers:
      - name: task-app
        image: taskregistry1.azurecr.io/frontend:latest

        ports:
        - containerPort: 3000