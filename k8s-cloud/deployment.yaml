
apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: task-system

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
        - name: frontend
          image: taskregistry1.azurecr.io/frontend:${{ github.sha }}
          imagePullPolicy: Always

          ports:
            - containerPort: 3000
