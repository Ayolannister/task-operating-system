apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule

metadata:
  name: api-alerts
  namespace: monitoring

  labels:
    release: monitoring

spec:
  groups:
    - name: api.rules

      rules:

      - alert: ApiDown

        expr: up{job="api"} == 0

        for: 1m

        labels:
          severity: critical

        annotations:
          summary: API is down
          description: The task API has not been reachable for over one minute.