
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: task-system

spec:
  replicas: 1

  selector:
    matchLabels:
      app: api

  template:
    metadata:
      labels:
        app: api

    spec:
      containers:
        - name: api
          image: taskregistry1.azurecr.io/api:${{ github.sha }}
          imagePullPolicy: Always

          ports:
            - containerPort: 5000

          env:
            - name: DB_HOST
              value: postgres

            - name: DB_USER
              value: dev

            - name: DB_PASSWORD
              value: dev

            - name: DB_NAME
              value: tasks

            - name: REDIS_HOST
              value: redis

          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: task-system

spec:
  type: ClusterIP

  selector:
    app: api

  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000

