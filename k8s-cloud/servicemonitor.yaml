apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor

metadata:
  name: api-monitor
  namespace: monitoring
  labels:
    release: monitoring 

spec:
  selector:
    matchLabels:
      app: api

  namespaceSelector:
    matchNames:
      - task-system

  endpoints:
    - port: http
      path: /metrics
      interval: 15s