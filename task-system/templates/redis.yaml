{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "task-system.fullname" . }}-redis
  labels:
    {{- include "task-system.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.redis.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "task-system.name" . }}-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "task-system.name" . }}-redis
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
    spec:
      {{- if or .Values.serviceAccount.create .Values.serviceAccount.name }}
      serviceAccountName: {{ if .Values.serviceAccount.name }}{{ .Values.serviceAccount.name }}{{ else }}{{ include "task-system.fullname" . }}{{ end }}
      {{- end }}
      containers:
        - name: redis
          image: "{{ .Values.redis.image }}{{ if .Values.redis.tag }}:{{ .Values.redis.tag }}{{ end }}"
          imagePullPolicy: {{ .Values.redis.pullPolicy }}
          ports:
            - containerPort: {{ .Values.redis.service.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "task-system.fullname" . }}-redis
  labels:
    {{- include "task-system.labels" . | nindent 4 }}
spec:
  ports:
    - port: {{ .Values.redis.service.port }}
      targetPort: {{ .Values.redis.service.port }}
  selector:
    app.kubernetes.io/name: {{ include "task-system.name" . }}-redis
{{- end }}
