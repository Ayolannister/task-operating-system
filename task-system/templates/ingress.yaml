{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "task-system.fullname" . }}
  labels:
    {{- include "task-system.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
  {{- range .Values.ingress.hosts }}
  - host: {{ .host }}
    http:
      paths:
        - path: /api
          pathType: Prefix
          backend:
            service:
              name: {{ include "task-system.fullname" . }}-api
              port:
                number: {{ .Values.api.service.port }}
        - path: /
          pathType: Prefix
          backend:
            service:
              name: {{ include "task-system.fullname" . }}-frontend
              port:
                number: {{ .Values.frontend.service.port }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
      {{- range .hosts }}
      - {{ . }}
      {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
{{- end }}
