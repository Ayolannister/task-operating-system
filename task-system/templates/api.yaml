{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "task-system.fullname" . }}-api
  labels:
    {{- include "task-system.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "task-system.name" . }}-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "task-system.name" . }}-api
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
    spec:
      {{- if or .Values.serviceAccount.create .Values.serviceAccount.name }}
      serviceAccountName: {{ if .Values.serviceAccount.name }}{{ .Values.serviceAccount.name }}{{ else }}{{ include "task-system.fullname" . }}{{ end }}
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.api.image }}{{ if .Values.api.tag }}:{{ .Values.api.tag }}{{ end }}"
          imagePullPolicy: {{ .Values.api.pullPolicy }}
          env:
{{- range $name, $value := .Values.api.env }}
            - name: {{ $name }}
              value: "{{ $value }}"
{{- end }}
          ports:
            - containerPort: {{ .Values.api.service.port }}
              name: http
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "task-system.fullname" . }}-api
  labels:
    {{- include "task-system.labels" . | nindent 4 }}
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: {{ .Values.api.service.port }}
  selector:
    app.kubernetes.io/name: {{ include "task-system.name" . }}-api
{{- end }}
