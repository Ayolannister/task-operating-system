{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "task-system.fullname" . }}-worker
  labels:
    {{- include "task-system.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "task-system.name" . }}-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "task-system.name" . }}-worker
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
    spec:
      {{- if or .Values.serviceAccount.create .Values.serviceAccount.name }}
      serviceAccountName: {{ if .Values.serviceAccount.name }}{{ .Values.serviceAccount.name }}{{ else }}{{ include "task-system.fullname" . }}{{ end }}
      {{- end }}
      containers:
        - name: worker
          image: "{{ .Values.worker.image }}{{ if .Values.worker.tag }}:{{ .Values.worker.tag }}{{ end }}"
          imagePullPolicy: {{ .Values.worker.pullPolicy }}
          env:
{{- range $name, $value := .Values.worker.env }}
            - name: {{ $name }}
              value: "{{ $value }}"
{{- end }}
{{- end }}
