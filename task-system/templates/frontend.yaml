{{- if .Values.frontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "task-system.fullname" . }}-frontend
  labels:
    {{- include "task-system.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "task-system.name" . }}-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "task-system.name" . }}-frontend
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
    spec:
      {{- if or .Values.serviceAccount.create .Values.serviceAccount.name }}
      serviceAccountName: {{ if .Values.serviceAccount.name }}{{ .Values.serviceAccount.name }}{{ else }}{{ include "task-system.fullname" . }}{{ end }}
      {{- end }}
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image }}{{ if .Values.frontend.tag }}:{{ .Values.frontend.tag }}{{ end }}"
          imagePullPolicy: {{ .Values.frontend.pullPolicy }}
          env:
{{- range $name, $value := .Values.frontend.env }}
            - name: {{ $name }}
              value: "{{ $value }}"
{{- end }}
          ports:
            - containerPort: {{ .Values.frontend.service.targetPort }}
              name: http
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "task-system.fullname" . }}-frontend
  labels:
    {{- include "task-system.labels" . | nindent 4 }}
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: {{ .Values.frontend.service.targetPort }}
  selector:
    app.kubernetes.io/name: {{ include "task-system.name" . }}-frontend
{{- end }}
