apiVersion: apps/v1
kind: Deployment

metadata:
  name: {{ .Values.api.name }}

spec:
  replicas: 1

  selector:
    matchLabels:
      app: api

  template:
    metadata:
      labels:
        app: api

    spec:
      containers:
      - name: api

        image: "{{ .Values.api.image }}"

        ports:
        - containerPort: 5000
